services:
  ai-proxy:
    image: ghcr.io/jo-hoe/ai-proxy:latest
    container_name: ai-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-7655}:${PROXY_PORT:-7655}"
      - "${MGMT_PORT:-7656}:${MGMT_PORT:-7656}"
    environment:
      PROXY_PORT: "${PROXY_PORT:-7655}"
      MGMT_PORT: "${MGMT_PORT:-7656}"
    volumes:
      - ./config.yaml:/config.yaml:ro
